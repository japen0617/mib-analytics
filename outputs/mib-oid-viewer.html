<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MIB OID 解析工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1d2430;
      --muted: #667085;
      --line: #d9dee8;
      --accent: #1463ff;
      --accent-dark: #0b4ed0;
      --danger: #b42318;
      --chip: #eef4ff;
      --shadow: 0 10px 24px rgba(16, 24, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(220px, 360px);
      gap: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #344054;
      font-weight: 650;
      font-size: 14px;
    }

    input[type="file"],
    input[type="search"] {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    input[type="file"] {
      padding: 9px 10px;
    }

    input[type="search"] {
      padding: 9px 12px;
    }

    input:focus {
      outline: 3px solid rgba(20, 99, 255, 0.16);
      border-color: var(--accent);
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 0 18px 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--chip);
      color: #1849a9;
      font-weight: 650;
    }

    .message {
      margin: 0 18px 18px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #f9fafb;
    }

    .message.error {
      border-color: #fecdca;
      color: var(--danger);
      background: #fffbfa;
    }

    .table-wrap {
      overflow: auto;
      border-top: 1px solid var(--line);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f8fafc;
      color: #344054;
      font-size: 13px;
      letter-spacing: 0;
    }

    td {
      font-size: 14px;
    }

    .name {
      font-weight: 700;
      color: #101828;
      white-space: nowrap;
    }

    .oid {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #174ea6;
      white-space: nowrap;
    }

    .definition {
      color: #475467;
      min-width: 300px;
    }

    .empty {
      padding: 34px 18px;
      color: var(--muted);
      text-align: center;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
      }

      header {
        display: block;
      }

      h1 {
        font-size: 23px;
      }

      .controls {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .summary {
        padding: 0 14px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>MIB OID 解析工具</h1>
        <p class="subtitle">選取 MIB 檔案後，自動解析名稱、定義與完整 numeric OID。</p>
      </div>
    </header>

    <section class="panel" aria-label="MIB parser">
      <div class="controls">
        <div>
          <label for="mibFile">MIB 檔案</label>
          <input id="mibFile" type="file" accept=".mib,.txt,text/plain">
        </div>
        <div>
          <label for="searchInput">依名稱搜尋</label>
          <input id="searchInput" type="search" placeholder="例如 x440g2、summitX460" disabled>
        </div>
      </div>

      <div class="summary" aria-live="polite">
        <span class="chip" id="totalCount">尚未載入</span>
        <span id="fileInfo">請先選擇 .mib 或 .txt 檔案。</span>
      </div>

      <p class="message" id="message">解析結果會顯示在下方表格。瀏覽器安全限制下，網頁不會自動讀取本機路徑，需由你手動選檔。</p>

      <div class="table-wrap hidden" id="tableWrap">
        <table>
          <thead>
            <tr>
              <th>名稱</th>
              <th>定義</th>
              <th>完整 OID</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>

      <div class="empty hidden" id="emptyState">沒有符合的名稱。</div>
    </section>
  </main>

  <script>
    const BUILTIN_OIDS = {
      iso: [1],
      org: [1, 3],
      dod: [1, 3, 6],
      internet: [1, 3, 6, 1],
      private: [1, 3, 6, 1, 4],
      enterprises: [1, 3, 6, 1, 4, 1]
    };

    const state = {
      entries: [],
      filtered: [],
      fileName: ""
    };

    const fileInput = document.getElementById("mibFile");
    const searchInput = document.getElementById("searchInput");
    const totalCount = document.getElementById("totalCount");
    const fileInfo = document.getElementById("fileInfo");
    const message = document.getElementById("message");
    const tableWrap = document.getElementById("tableWrap");
    const resultBody = document.getElementById("resultBody");
    const emptyState = document.getElementById("emptyState");

    fileInput.addEventListener("change", handleFileSelect);
    searchInput.addEventListener("input", applySearch);

    async function handleFileSelect(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        resetView("請先選擇 .mib 或 .txt 檔案。");
        return;
      }

      try {
        const text = await file.text();
        const entries = parseMib(text);

        state.entries = entries;
        state.filtered = entries;
        state.fileName = file.name;
        searchInput.value = "";
        searchInput.disabled = entries.length === 0;

        fileInfo.textContent = `已載入：${file.name}`;
        totalCount.textContent = `共 ${entries.length} 筆`;

        if (entries.length === 0) {
          showMessage("沒有解析到 OBJECT IDENTIFIER 定義。請確認檔案內容是否為 MIB 格式。", true);
          render();
          return;
        }

        showMessage(`解析完成。可用名稱搜尋篩選 ${entries.length} 筆資料。`, false);
        render();
      } catch (error) {
        resetView(`檔案讀取或解析失敗：${error.message || error}`);
      }
    }

    function resetView(text) {
      state.entries = [];
      state.filtered = [];
      state.fileName = "";
      searchInput.value = "";
      searchInput.disabled = true;
      totalCount.textContent = "尚未載入";
      fileInfo.textContent = text;
      showMessage("解析結果會顯示在下方表格。瀏覽器安全限制下，網頁不會自動讀取本機路徑，需由你手動選檔。", false);
      render();
    }

    function showMessage(text, isError) {
      message.textContent = text;
      message.classList.toggle("error", Boolean(isError));
    }

    function applySearch() {
      const keyword = searchInput.value.trim().toLowerCase();
      state.filtered = keyword
        ? state.entries.filter((entry) => entry.name.toLowerCase().includes(keyword))
        : state.entries.slice();

      const shown = state.filtered.length;
      totalCount.textContent = keyword
        ? `顯示 ${shown} / ${state.entries.length} 筆`
        : `共 ${state.entries.length} 筆`;

      render();
    }

    function parseMib(text) {
      const lines = text.replace(/\r\n?/g, "\n").split("\n");
      const symbols = new Map(Object.entries(BUILTIN_OIDS));
      const definitions = [];

      for (let index = 0; index < lines.length; index += 1) {
        const assignment = lines[index].match(/::=\s*\{\s*([A-Za-z][\w-]*)\s+(\d+)\s*\}/);
        if (!assignment) {
          continue;
        }

        const declaration = readDeclaration(lines, index);
        if (!declaration) {
          continue;
        }

        const parent = assignment[1];
        const id = Number(assignment[2]);
        const parentOid = symbols.get(parent);
        if (!parentOid) {
          continue;
        }

        const oidParts = parentOid.concat(id);
        symbols.set(declaration.name, oidParts);

        if (declaration.type.toUpperCase().includes("OBJECT IDENTIFIER")) {
          definitions.push({
            name: declaration.name,
            definition: readFollowingComments(lines, index + 1),
            oid: `.${oidParts.join(".")}`
          });
        }
      }

      return definitions;
    }

    function readDeclaration(lines, assignmentIndex) {
      const sameLine = lines[assignmentIndex].slice(0, lines[assignmentIndex].indexOf("::=")).trim();
      const sameLineMatch = sameLine.match(/^([A-Za-z][\w-]*)\s+(MODULE-IDENTITY|OBJECT\s+IDENTIFIER|OBJECT-IDENTITY)\b/i);
      if (sameLineMatch) {
        return {
          name: sameLineMatch[1],
          type: sameLineMatch[2].trim()
        };
      }

      for (let index = assignmentIndex - 1; index >= 0; index -= 1) {
        const trimmed = lines[index].trim();
        if (!trimmed || trimmed.startsWith("--")) {
          continue;
        }

        const match = trimmed.match(/^([A-Za-z][\w-]*)\s+(MODULE-IDENTITY|OBJECT\s+IDENTIFIER|OBJECT-IDENTITY)\b/i);
        if (match) {
          return {
            name: match[1],
            type: match[2].trim()
          };
        }

        continue;
      }

      return null;
    }

    function readFollowingComments(lines, startIndex) {
      const comments = [];

      for (let index = startIndex; index < lines.length; index += 1) {
        const trimmed = lines[index].trim();
        if (!trimmed) {
          if (comments.length > 0) {
            break;
          }
          continue;
        }

        if (!trimmed.startsWith("--")) {
          break;
        }

        comments.push(trimmed.replace(/^--\s?/, "").trim());
      }

      return comments.join(" ") || "-";
    }

    function render() {
      resultBody.textContent = "";

      if (state.entries.length === 0) {
        tableWrap.classList.add("hidden");
        emptyState.classList.add("hidden");
        return;
      }

      if (state.filtered.length === 0) {
        tableWrap.classList.add("hidden");
        emptyState.classList.remove("hidden");
        return;
      }

      const fragment = document.createDocumentFragment();
      for (const entry of state.filtered) {
        const row = document.createElement("tr");
        row.appendChild(createCell(entry.name, "name"));
        row.appendChild(createCell(entry.definition, "definition"));
        row.appendChild(createCell(entry.oid, "oid"));
        fragment.appendChild(row);
      }

      resultBody.appendChild(fragment);
      tableWrap.classList.remove("hidden");
      emptyState.classList.add("hidden");
    }

    function createCell(text, className) {
      const cell = document.createElement("td");
      cell.className = className;
      cell.textContent = text;
      return cell;
    }
  </script>
</body>
</html>
